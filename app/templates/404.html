{% extends "base.html" %}

{% block title %}404 — Page Not Found — Doxium{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 200px);">
  <div class="glass-card text-center" style="padding:3rem 4rem;max-width:480px;width:100%;">
    <h1 class="gradient-text fw-bold" style="font-size:6rem;line-height:1;margin-bottom:0.5rem;">404</h1>
    <h3 class="fw-bold mb-2" style="color:#fff;">Page Not Found</h3>
    <p class="text-muted mb-4" style="font-size:0.9rem;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('main.home') }}" class="btn btn-primary">
      <i class="fas fa-home me-1"></i>Go Home
    </a>
  </div>
</div>
{% endblock %}
