{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div style="min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="text-center" style="max-width: 420px; animation: fadeUp 0.5s ease both;">
        <div class="glass-card p-8">
            <h1 class="fw-bold mb-2" style="font-size: 5rem; line-height: 1;"><span class="gradient-text">404</span></h1>
            <h2 class="fw-bold mb-3">Page Not Found</h2>
            <p class="mb-4" style="color: var(--text-muted);">The page you are looking for does not exist or has been moved.</p>
            <a href="{{ url_for('main.home') }}" class="btn btn-primary"><i class="fas fa-home me-2"></i>Go Home</a>
        </div>
    </div>
</div>
{% endblock %}
