{% extends "base.html" %}
{% block title %}Payment Cancelled — Doxium{% endblock %}
{% block content %}
<div class="container-fluid py-32">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="glass-card p-8 text-center" style="max-width:480px; margin:0 auto;">
                <div style="width:80px;height:80px;border-radius:50%;background:rgba(239,68,68,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
                    <i class="fas fa-times" style="font-size:2rem;color:#ef4444;"></i>
                </div>
                <h1 class="text-2xl fw-bold mb-3">Payment Cancelled</h1>
                <p class="text-muted mb-6">Your payment was cancelled and no charges were made. You can try again whenever you're ready.</p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="{{ url_for('main.pricing') }}" class="btn btn-primary">
                        <i class="fas fa-credit-card me-1"></i>View Plans
                    </a>
                    <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-1"></i>Dashboard
                    </a>
                </div>
                <p class="text-xs text-muted mt-4">Need help? Contact <strong>support@doxium.app</strong></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
