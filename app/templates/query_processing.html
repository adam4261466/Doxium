{% extends "base.html" %}
{% block content %}
<div style="min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="text-center" style="max-width: 420px; animation: fadeUp 0.5s ease both;">
        <div class="glass-card p-8">
            <div class="spinner-border mb-4" style="width: 4rem; height: 4rem; color: var(--accent);" role="status">
                <span class="visually-hidden">Generating...</span>
            </div>
            <h2 class="fw-bold mb-2">AI is thinking...</h2>
            <p style="color: var(--text-muted);">Processing your query with document search (10-30 seconds)</p>
        </div>
    </div>
</div>
<script>
    setTimeout(function() { window.location.reload(); }, 3000);
</script>
{% endblock %}
