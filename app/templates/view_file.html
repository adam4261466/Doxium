{% extends "base.html" %}

{% block title %}Downloading — Doxium{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 200px);">
  <div class="glass-card text-center" style="padding:3rem 4rem;max-width:420px;width:100%;">
    <div style="width:64px;height:64px;border-radius:50%;background:rgba(124,58,237,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
      <i class="fas fa-download" style="font-size:1.5rem;color:#7c3aed;animation:float 2s ease-in-out infinite;"></i>
    </div>
    <h4 class="fw-bold mb-2" style="color:#fff;">Downloading file...</h4>
    <p class="text-muted text-sm mb-3">Your download should start automatically.</p>
    <div style="height:3px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;">
      <div style="height:100%;width:60%;background:linear-gradient(135deg,#7c3aed,#6366f1);border-radius:3px;animation:shimmer 1.5s ease-in-out infinite;background-size:200% 100%;"></div>
    </div>
    <p class="text-muted mt-3" style="font-size:0.75rem;">
      <i class="fas fa-arrow-left me-1"></i>
      <a href="{{ url_for('main.dashboard') }}" style="color:#7c3aed;">Back to Dashboard</a>
    </p>
  </div>
</div>
{% endblock %}
