{% extends 'base.html' %}
{% block content %}
<div style="min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div style="max-width: 720px; width: 100%; animation: fadeUp 0.5s ease both;">
        <div class="glass-card p-6">
            <h2 class="fw-bold mb-3"><i class="fas fa-file-alt me-2" style="color: var(--accent);"></i>Viewing: {{ filename }}</h2>
            <pre class="preview-content p-3" style="white-space: pre-wrap; max-height: 60vh; overflow-y: auto;">{{ content }}</pre>
            <div class="mt-3">
                <a href="{{ url_for('main.home') }}" class="btn btn-primary"><i class="fas fa-arrow-left me-2"></i>Back</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
