{# Shared app sidebar. Expects: folders, tags, current_folder_id, current_tag_id, active_page #}
{% set active_page = active_page | default('dashboard') %}
<aside class="sidebar" id="appSidebar">
    <div class="sidebar-inner">
        <!-- Logo -->
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">
                <i class="fas fa-sparkles"></i>
            </div>
            <span class="sidebar-logo-text">Doxium</span>
        </div>

        <!-- All Nav -->
        <nav class="sidebar-nav">
            <a href="{{ url_for('main.dashboard') }}" class="sidebar-nav-item {{ 'active' if active_page == 'dashboard' and not current_folder_id and not current_tag_id }}" title="Dashboard">
                <div class="sidebar-nav-icon"><i class="fas fa-th-large"></i></div>
                <span class="sidebar-nav-label">Dashboard</span>
            </a>
            <button type="button" class="sidebar-nav-item" onclick="openAIQuery('{{ url_for('main.dashboard') }}')" title="AI Query">
                <div class="sidebar-nav-icon"><i class="fas fa-robot"></i></div>
                <span class="sidebar-nav-label">AI Query</span>
            </button>
            <a href="{{ url_for('main.folders_page') }}" class="sidebar-nav-item {{ 'active' if active_page == 'folders' }}" title="Folders">
                <div class="sidebar-nav-icon"><i class="fas fa-folder"></i></div>
                <span class="sidebar-nav-label">Folders</span>
            </a>
            <a href="{{ url_for('main.tags_page') }}" class="sidebar-nav-item {{ 'active' if active_page == 'tags' }}" title="Tags">
                <div class="sidebar-nav-icon"><i class="fas fa-tag"></i></div>
                <span class="sidebar-nav-label">Tags</span>
            </a>
            <a href="{{ url_for('main.statistics') }}" class="sidebar-nav-item {{ 'active' if active_page == 'statistics' }}" title="Statistics">
                <div class="sidebar-nav-icon"><i class="fas fa-chart-bar"></i></div>
                <span class="sidebar-nav-label">Statistics</span>
            </a>
            <a href="{{ url_for('main.settings') }}" class="sidebar-nav-item {{ 'active' if active_page == 'settings' }}" title="Settings">
                <div class="sidebar-nav-icon"><i class="fas fa-cog"></i></div>
                <span class="sidebar-nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <!-- User Footer -->
    <div class="sidebar-footer">
        <div class="sidebar-user-avatar"><i class="fas fa-user"></i></div>
        <div class="sidebar-user-info">
            <div class="sidebar-user-name">{{ current_user.username }}</div>
            <div class="sidebar-user-email">{{ current_user.email }}</div>
        </div>
        <a href="{{ url_for('main.logout') }}" class="sidebar-logout-btn" title="Logout">
            <i class="fas fa-sign-out-alt"></i>
        </a>
    </div>
</aside>
