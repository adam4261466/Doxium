{% extends "base.html" %}
{% block title %}Payment Successful — Doxium{% endblock %}
{% block content %}
<div class="container-fluid py-32">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="glass-card p-8 text-center" style="max-width:480px; margin:0 auto;">
                <div style="width:80px;height:80px;border-radius:50%;background:rgba(34,197,94,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
                    <i class="fas fa-check" style="font-size:2rem;color:#22c55e;"></i>
                </div>
                <h1 class="text-2xl fw-bold mb-3">Payment Successful!</h1>
                <p class="text-muted mb-6">Your Pro access is now active. Enjoy unlimited documents, AI queries, and advanced features.</p>
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-lg glow-purple">
                    <i class="fas fa-tachometer-alt me-2"></i>Go to Dashboard
                </a>
                <p class="text-xs text-muted mt-4" id="status-text">
                    Verifying subscription...
                </p>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    var statusEl = document.getElementById('status-text');
    var attempts = 0;
    var maxAttempts = 60;

    async function poll() {
        attempts += 1;
        try {
            var res = await fetch('{{ url_for("main.me_status") }}', { credentials: 'same-origin' });
            if (res.ok) {
                var data = await res.json();
                if (data.is_pilot) {
                    statusEl.textContent = 'Access confirmed. Redirecting...';
                    window.location.href = '{{ url_for("main.dashboard") }}';
                    return;
                }
                if (data.subscription_status) {
                    statusEl.textContent = 'Confirming... (' + data.subscription_status + ')';
                }
            }
        } catch (e) {}

        if (attempts < maxAttempts) {
            setTimeout(poll, 2000);
        } else {
            statusEl.textContent = 'Still processing. You can refresh or return later.';
        }
    }

    poll();
})();
</script>
{% endblock %}
