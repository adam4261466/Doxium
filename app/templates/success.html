{% extends "base.html" %}
{% block content %}
<div style="min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="text-center" style="max-width: 480px; animation: fadeUp 0.5s ease both;">
        <div class="glass-card p-8">
            <div class="mb-4">
                <div class="d-inline-flex align-items-center justify-content-center mb-4" style="width: 80px; height: 80px; border-radius: 50%; background: rgba(99, 102, 241, 0.15);">
                    <i class="fas fa-hourglass-half fa-3x" style="color: var(--accent);"></i>
                </div>
            </div>
            <h1 class="fw-bold mb-3" style="font-size: 1.75rem;">Activating Your Account</h1>
            <p class="mb-4" style="color: var(--text-muted); font-size: 1.05rem;">Thanks for your purchase! We are confirming your subscription now.</p>
            <div class="alert alert-info mb-4" style="text-align: left;">
                <strong>Keep this page open.</strong> We will redirect you automatically as soon as your access is active.
            </div>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-primary">
                <i class="fas fa-th-large me-2"></i>Go to Dashboard
            </a>
            <div class="mt-3">
                <small class="text-muted" id="status-text">Waiting for webhook confirmation...</small>
            </div>
        </div>
    </div>
</div>
<script>
  (function () {
    const statusEl = document.getElementById('status-text');
    let attempts = 0;
    const maxAttempts = 60;
    async function poll() {
      attempts += 1;
      try {
        const res = await fetch('{{ url_for("main.me_status") }}', { credentials: 'same-origin' });
        if (res.ok) {
          const data = await res.json();
          if (data.is_pilot) { statusEl.textContent = 'Access active. Redirecting...'; window.location.href = '{{ url_for("main.dashboard") }}'; return; }
          if (data.subscription_status) { statusEl.textContent = 'Waiting for webhook confirmation... (' + data.subscription_status + ')'; }
        }
      } catch (e) {}
      if (attempts < maxAttempts) { setTimeout(poll, 2000); } else { statusEl.textContent = 'Still waiting. You can refresh or return later.'; }
    }
    poll();
  })();
</script>
{% endblock %}
