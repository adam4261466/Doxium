[build]
  dockerfile = "Dockerfile"

[[services]]
  name = "web"
  startCommand = "sh start.sh"
  healthcheckPath = "/health"
  restartPolicyType = "on-failure"

[[services]]
  name = "worker"
  startCommand = "celery -A app.celery_app.celery worker --loglevel=info --concurrency=2 -P prefork"
  restartPolicyType = "on-failure"

[[services]]
  name = "beat"
  startCommand = "celery -A app.celery_app.celery beat --loglevel=info"
  restartPolicyType = "on-failure"
